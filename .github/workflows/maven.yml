name: Run Shell Script

on:
  workflow_dispatch:   # manual run
  push:
    branches: [ Master ]

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show directory
        run: pwd

      - name: List files
        run: ls -la

      - name: Run shell script
        run: chmod +x script.sh
        
      - name: List file
        env: 
          BUSINESS_PROJECT: ${{ secrets.BUSINESS_PROJECT }}
        run: ./script.sh
